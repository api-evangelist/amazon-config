              schema:
                $ref: '#/components/schemas/InvalidParameterValueException'
              examples:
                DescribeConfigurationAggregatorSourcesStatus480Example:
                  summary: Default DescribeConfigurationAggregatorSourcesStatus 480
                  x-microcks-default: true
                  value: example
        '481':
          description: NoSuchConfigurationAggregatorException
