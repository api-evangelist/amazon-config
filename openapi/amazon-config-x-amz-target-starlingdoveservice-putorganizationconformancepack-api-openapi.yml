      items:
        $ref: '#/components/schemas/ConformancePackInputParameter'
      minItems: 0
      maxItems: 60
    NoAvailableOrganizationException: {}
    TemplateBody:
      type: string
      minLength: 1
      maxLength: 51200
    TemplateS3Uri:
      type: string
      pattern: s3://.*
      minLength: 1
      maxLength: 1024
    AccountId:
