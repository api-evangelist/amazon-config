components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  schemas:
    OrganizationConformancePackStatuses:
      type: array
      items:
        $ref: '#/components/schemas/OrganizationConformancePackStatus'
    OrganizationConformancePackName:
      type: string
      pattern: '[a-zA-Z][-a-zA-Z0-9]*'
      minLength: 1
      maxLength: 128
    OrganizationResourceStatus:
      type: string
      enum:
      - CREATE_SUCCESSFUL
      - CREATE_IN_PROGRESS
      - CREATE_FAILED
      - DELETE_SUCCESSFUL
      - DELETE_FAILED
      - DELETE_IN_PROGRESS
      - UPDATE_SUCCESSFUL
      - UPDATE_IN_PROGRESS
      - UPDATE_FAILED
    NoSuchOrganizationConformancePackException: {}
    Date:
      type: string
      format: date-time
    DescribeOrganizationConformancePackStatusesRequest:
      type: object
      title: DescribeOrganizationConformancePackStatusesRequest
      properties:
        OrganizationConformancePackNames:
          allOf:
          - $ref: '#/components/schemas/OrganizationConformancePackNames'
          - description: 'The names of organization conformance packs for which you want status details. If you do not specify any names, Config returns details for all your organization conformance packs. '
        Limit:
          allOf:
          - $ref: '#/components/schemas/CosmosPageLimit'
          - description: 'The maximum number of OrganizationConformancePackStatuses returned on each page. If you do no specify a number, Config uses the default. The default is 100. '
        NextToken:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: 'The nextToken string returned on a previous page that you use to get the next page of results in a paginated response. '
    InvalidNextTokenException: {}
    CosmosPageLimit:
      type: integer
      minimum: 0
      maximum: 100
    InvalidLimitException: {}
    DescribeOrganizationConformancePackStatusesResponse:
      type: object
      properties:
        OrganizationConformancePackStatuses:
          allOf:
          - $ref: '#/components/schemas/OrganizationConformancePackStatuses'
          - description: 'A list of <code>OrganizationConformancePackStatus</code> objects. '
        NextToken:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: 'The nextToken string returned on a previous page that you use to get the next page of results in a paginated response. '
    OrganizationConformancePackNames:
      type: array
      items:
        $ref: '#/components/schemas/OrganizationConformancePackName'
      minItems: 0
      maxItems: 25
    String:
      type: string
    OrganizationConformancePackStatus:
      type: object
      required:
      - OrganizationConformancePackName
      - Status
      properties:
        OrganizationConformancePackName:
          allOf:
          - $ref: '#/components/schemas/OrganizationConformancePackName'
          - description: The name that you assign to organization conformance pack.
        Status:
          allOf:
          - $ref: '#/components/schemas/OrganizationResourceStatus'
          - description: <p>Indicates deployment status of an organization conformance pack. When management account calls PutOrganizationConformancePack for the first time, conformance pack status is created in all the member accounts. When management account calls PutOrganizationConformancePack for the second time, conformance pack status is updated in all the member accounts. Additionally, conformance pack status is updated when one or more member accounts join or leave an organization. Conformance pack status is deleted when the management account deletes OrganizationConformancePack in all the member accounts and disables service access for <code>config-multiaccountsetup.amazonaws.com</code>.</p> <p>Config sets the state of the conformance pack to:</p> <ul> <li> <p> <code>CREATE_SUCCESSFUL</code> when an organization conformance pack has been successfully created in all the member accounts. </p> </li> <li> <p> <code>CREATE_IN_PROGRESS</code> when an organization conformance pack creation is in progress.</p> </li> <li> <p> <code>CREATE_FAILED</code> when an organization conformance pack creation failed in one or more member accounts within that organization.</p> </li> <li> <p> <code>DELETE_FAILED</code> when an organization conformance pack deletion failed in one or more member accounts within that organization.</p> </li> <li> <p> <code>DELETE_IN_PROGRESS</code> when an organization conformance pack deletion is in progress.</p> </li> <li> <p> <code>DELETE_SUCCESSFUL</code> when an organization conformance pack has been successfully deleted from all the member accounts.</p> </li> <li> <p> <code>UPDATE_SUCCESSFUL</code> when an organization conformance pack has been successfully updated in all the member accounts.</p> </li> <li> <p> <code>UPDATE_IN_PROGRESS</code> when an organization conformance pack update is in progress.</p> </li> <li> <p> <code>UPDATE_FAILED</code> when an organization conformance pack update failed in one or more member accounts within that organization.</p> </li> </ul>
        ErrorCode:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: 'An error code that is returned when organization conformance pack creation or deletion has failed in a member account. '
        ErrorMessage:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: 'An error message indicating that organization conformance pack creation or deletion failed due to an error. '
        LastUpdateTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The timestamp of the last update.
      description: Returns the status for an organization conformance pack in an organization.
    OrganizationAccessDeniedException: {}
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
