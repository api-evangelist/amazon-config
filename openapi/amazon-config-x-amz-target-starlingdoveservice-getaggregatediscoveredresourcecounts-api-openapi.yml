paths:
  /#X-Amz-Target=StarlingDoveService.GetAggregateDiscoveredResourceCounts:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
