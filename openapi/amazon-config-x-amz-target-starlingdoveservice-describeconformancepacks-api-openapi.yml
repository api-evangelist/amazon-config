      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  schemas:
    DeliveryS3KeyPrefix:
      type: string
      minLength: 0
      maxLength: 1024
    StringWithCharLimit256:
      type: string
      minLength: 1
      maxLength: 256
    ParameterName:
      type: string
      minLength: 0
      maxLength: 255
    SSMDocumentName:
      type: string
      pattern: ^[a-zA-Z0-9_\-.:/]{3,200}$
    SSMDocumentVersion:
      type: string
      pattern: ([$]LATEST|[$]DEFAULT|^[1-9][0-9]*$)
    ConformancePackNamesList:
      type: array
      items:
        $ref: '#/components/schemas/ConformancePackName'
      minItems: 0
      maxItems: 25
    NoSuchConformancePackException: {}
    DescribeConformancePacksResponse:
      type: object
      properties:
        ConformancePackDetails:
          allOf:
          - $ref: '#/components/schemas/ConformancePackDetailList'
          - description: Returns a list of <code>ConformancePackDetail</code> objects.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The <code>nextToken</code> string returned in a previous request that you use to request the next page of results in a paginated response.
    ConformancePackDetailList:
      type: array
      items:
        $ref: '#/components/schemas/ConformancePackDetail'
      minItems: 0
      maxItems: 25
    Date:
      type: string
      format: date-time
    DeliveryS3Bucket:
      type: string
      minLength: 0
      maxLength: 63
    ConformancePackId:
      type: string
      minLength: 1
      maxLength: 1024
    ConformancePackInputParameter:
      type: object
      required:
      - ParameterName
      - ParameterValue
      properties:
        ParameterName:
          allOf:
          - $ref: '#/components/schemas/ParameterName'
          - description: One part of a key-value pair.
        ParameterValue:
          allOf:
          - $ref: '#/components/schemas/ParameterValue'
          - description: 'Another part of the key-value pair. '
      description: Input parameters in the form of key-value pairs for the conformance pack, both of which you define. Keys can have a maximum character length of 255 characters, and values can have a maximum length of 4096 characters.
    InvalidNextTokenException: {}
    InvalidParameterValueException: {}
    DescribeConformancePacksRequest:
      type: object
      title: DescribeConformancePacksRequest
      properties:
        ConformancePackNames:
          allOf:
          - $ref: '#/components/schemas/ConformancePackNamesList'
          - description: 'Comma-separated list of conformance pack names for which you want details. If you do not specify any names, Config returns details for all your conformance packs. '
        Limit:
          allOf:
          - $ref: '#/components/schemas/PageSizeLimit'
          - description: The maximum number of conformance packs returned on each page.
        NextToken:
          allOf:
          - $ref: '#/components/schemas/NextToken'
          - description: The <code>nextToken</code> string returned in a previous request that you use to request the next page of results in a paginated response.
    ConformancePackName:
      type: string
      pattern: '[a-zA-Z][-a-zA-Z0-9]*'
      minLength: 1
      maxLength: 256
    InvalidLimitException: {}
    ParameterValue:
      type: string
      minLength: 0
      maxLength: 4096
    ConformancePackDetail:
      type: object
      required:
      - ConformancePackName
      - ConformancePackArn
      - ConformancePackId
      properties:
        ConformancePackName:
          allOf:
          - $ref: '#/components/schemas/ConformancePackName'
          - description: Name of the conformance pack.
        ConformancePackArn:
          allOf:
          - $ref: '#/components/schemas/ConformancePackArn'
          - description: Amazon Resource Name (ARN) of the conformance pack.
        ConformancePackId:
          allOf:
          - $ref: '#/components/schemas/ConformancePackId'
          - description: ID of the conformance pack.
        DeliveryS3Bucket:
          allOf:
          - $ref: '#/components/schemas/DeliveryS3Bucket'
          - description: <p>The name of the Amazon S3 bucket where Config stores conformance pack templates. </p> <note> <p>This field is optional.</p> </note>
        DeliveryS3KeyPrefix:
          allOf:
          - $ref: '#/components/schemas/DeliveryS3KeyPrefix'
          - description: <p>The prefix for the Amazon S3 bucket.</p> <note> <p>This field is optional.</p> </note>
        ConformancePackInputParameters:
          allOf:
          - $ref: '#/components/schemas/ConformancePackInputParameters'
          - description: A list of <code>ConformancePackInputParameter</code> objects.
        LastUpdateRequestedTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: 'The last time a conformation pack update was requested. '
        CreatedBy:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit256'
          - description: The Amazon Web Services service that created the conformance pack.
        TemplateSSMDocumentDetails:
          allOf:
          - $ref: '#/components/schemas/TemplateSSMDocumentDetails'
          - description: An object that contains the name or Amazon Resource Name (ARN) of the Amazon Web Services Systems Manager document (SSM document) and the version of the SSM document that is used to create a conformance pack.
      description: Returns details of a conformance pack. A conformance pack is a collection of Config rules and remediation actions that can be easily deployed in an account and a region.
    ConformancePackArn:
      type: string
      minLength: 1
      maxLength: 2048
    ConformancePackInputParameters:
      type: array
      items:
        $ref: '#/components/schemas/ConformancePackInputParameter'
      minItems: 0
      maxItems: 60
    TemplateSSMDocumentDetails:
      type: object
      required:
      - DocumentName
      properties:
        DocumentName:
          allOf:
          - $ref: '#/components/schemas/SSMDocumentName'
          - description: The name or Amazon Resource Name (ARN) of the SSM document to use to create a conformance pack. If you use the document name, Config checks only your account and Amazon Web Services Region for the SSM document. If you want to use an SSM document from another Region or account, you must provide the ARN.
        DocumentVersion:
          allOf:
          - $ref: '#/components/schemas/SSMDocumentVersion'
          - description: <p>The version of the SSM document to use to create a conformance pack. By default, Config uses the latest version.</p> <note> <p>This field is optional.</p> </note>
      description: <p>This API allows you to create a conformance pack template with an Amazon Web Services Systems Manager document (SSM document). To deploy a conformance pack using an SSM document, first create an SSM document with conformance pack content, and then provide the <code>DocumentName</code> in the <a href="https://docs.aws.amazon.com/config/latest/APIReference/API_PutConformancePack.html">PutConformancePack API</a>. You can also provide the <code>DocumentVersion</code>.</p> <p>The <code>TemplateSSMDocumentDetails</code> object contains the name of the SSM document and the version of the SSM document.</p>
    PageSizeLimit:
      type: integer
      minimum: 0
      maximum: 20
    NextToken:
      type: string
