tags:
- name: '#X Amz Target=StarlingDoveService.PutRemediationExceptions'
paths:
  /#X-Amz-Target=StarlingDoveService.PutRemediationExceptions:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: PutRemediationExceptions
      description: <p>A remediation exception is when a specified resource is no longer considered for auto-remediation. This API adds a new exception or updates an existing exception for a specified resource with a specified Config rule. </p> <note> <p>Config generates a remediation exception when a problem occurs running a remediation action for a specified resource. Remediation exceptions blocks auto-remediation until the exception is cleared.</p> </note> <note> <p>When placing an exception on an Amazon Web Services resource, it is recommended that remediation is set as manual remediation until the given Config rule for the specified resource evaluates the resource as <code>NON_COMPLIANT</code>. Once the resource has been evaluated as <code>NON_COMPLIANT</code>, you can add remediation exceptions and change the remediation type back from Manual to Auto if you want to use auto-remediation. Otherwise, using auto-remediation before a <code>NON_COMPLIANT</code> evaluation result can delete resources before the exception is applied.</p> </note> <note> <p>Placing an exception can only be performed on resources that are <code>NON_COMPLIANT</code>. If you use this API for <code>COMPLIANT</code> resources or resources that are <code>NOT_APPLICABLE</code>, a remediation exception will not be generated. For more information on the conditions that initiate the possible Config evaluation results, see <a href="https://docs.aws.amazon.com/config/latest/developerguide/config-concepts.html#aws-config-rules">Concepts | Config Rules</a> in the <i>Config Developer Guide</i>.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutRemediationExceptionsResponse'
              examples:
                PutRemediationExceptions200Example:
                  summary: Default PutRemediationExceptions 200
                  x-microcks-default: true
                  value:
                    FailedBatches: example
        '480':
          description: InvalidParameterValueException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterValueException'
              examples:
                PutRemediationExceptions480Example:
                  summary: Default PutRemediationExceptions 480
                  x-microcks-default: true
                  value: example
        '481':
          description: InsufficientPermissionsException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsufficientPermissionsException'
              examples:
                PutRemediationExceptions481Example:
                  summary: Default PutRemediationExceptions 481
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutRemediationExceptionsRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.PutRemediationExceptions
      summary: Amazon Config Put Remediation Exceptions
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=StarlingDoveService.PutRemediationExceptions'
components:
  parameters:
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
  schemas:
    StringWithCharLimit256:
      type: string
      minLength: 1
      maxLength: 256
    PutRemediationExceptionsResponse:
      type: object
      properties:
        FailedBatches:
          allOf:
          - $ref: '#/components/schemas/FailedRemediationExceptionBatches'
          - description: Returns a list of failed remediation exceptions batch objects. Each object in the batch consists of a list of failed items and failure messages.
    StringWithCharLimit1024:
      type: string
      minLength: 1
      maxLength: 1024
    RemediationExceptionResourceKey:
      type: object
      properties:
        ResourceType:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit256'
          - description: The type of a resource.
        ResourceId:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit1024'
          - description: The ID of the resource (for example., sg-xxxxxx).
      description: 'The details that identify a resource within Config, including the resource type and resource ID. '
    Date:
      type: string
      format: date-time
    InsufficientPermissionsException: {}
    PutRemediationExceptionsRequest:
      type: object
      required:
      - ConfigRuleName
      - ResourceKeys
      title: PutRemediationExceptionsRequest
      properties:
        ConfigRuleName:
          allOf:
          - $ref: '#/components/schemas/ConfigRuleName'
          - description: The name of the Config rule for which you want to create remediation exception.
        ResourceKeys:
          allOf:
          - $ref: '#/components/schemas/RemediationExceptionResourceKeys'
          - description: 'An exception list of resource exception keys to be processed with the current request. Config adds exception for each resource key. For example, Config adds 3 exceptions for 3 resource keys. '
        Message:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit1024'
          - description: The message contains an explanation of the exception.
        ExpirationTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The exception is automatically deleted after the expiration date.
    RemediationException:
      type: object
      required:
      - ConfigRuleName
      - ResourceType
      - ResourceId
      properties:
        ConfigRuleName:
          allOf:
          - $ref: '#/components/schemas/ConfigRuleName'
          - description: The name of the Config rule.
        ResourceType:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit256'
          - description: The type of a resource.
        ResourceId:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit1024'
          - description: The ID of the resource (for example., sg-xxxxxx).
        Message:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit1024'
          - description: An explanation of an remediation exception.
        ExpirationTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The time when the remediation exception will be deleted.
      description: 'An object that represents the details about the remediation exception. The details include the rule name, an explanation of an exception, the time when the exception will be deleted, the resource ID, and resource type. '
    RemediationExceptions:
      type: array
      items:
        $ref: '#/components/schemas/RemediationException'
      minItems: 0
      maxItems: 25
    InvalidParameterValueException: {}
    FailedRemediationExceptionBatch:
      type: object
      properties:
        FailureMessage:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: Returns a failure message. For example, the auto-remediation has failed.
        FailedItems:
          allOf:
          - $ref: '#/components/schemas/RemediationExceptions'
          - description: Returns remediation exception resource key object of the failed items.
      description: List of each of the failed remediation exceptions with specific reasons.
    ConfigRuleName:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 128
    RemediationExceptionResourceKeys:
      type: array
      items:
        $ref: '#/components/schemas/RemediationExceptionResourceKey'
      minItems: 1
      maxItems: 100
    String:
      type: string
    FailedRemediationExceptionBatches:
      type: array
      items:
        $ref: '#/components/schemas/FailedRemediationExceptionBatch'
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
