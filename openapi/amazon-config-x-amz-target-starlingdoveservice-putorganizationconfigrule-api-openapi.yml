          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAccessDeniedException'
              examples:
                PutOrganizationConfigRule484Example:
                  summary: Default PutOrganizationConfigRule 484
                  x-microcks-default: true
                  value: example
        '485':
