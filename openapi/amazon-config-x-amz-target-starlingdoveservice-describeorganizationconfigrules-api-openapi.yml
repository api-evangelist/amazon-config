    post:
      operationId: DescribeOrganizationConfigRules
      description: <p>Returns a list of organization Config rules. </p> <note> <p>When you specify the limit and the next token, you receive a paginated response.</p> <p>Limit and next token are not applicable if you specify organization Config rule names. It is only applicable, when you request all the organization Config rules.</p> <p> <i>For accounts within an organzation</i> </p> <p>If you deploy an organizational rule or conformance pack in an organization administrator account, and then establish a delegated administrator and deploy an organizational rule or conformance pack in the delegated administrator account, you won't be able to see the organizational rule or conformance pack in the organization administrator account from the delegated administrator account or see the organizational rule or conformance pack in the delegated administrator account from organization administrator account. The <code>DescribeOrganizationConfigRules</code> and <code>DescribeOrganizationConformancePacks</code> APIs can only see and interact with the organization-related resource that were deployed from within the account calling those APIs.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeOrganizationConfigRulesResponse'
              examples:
                DescribeOrganizationConfigRules200Example:
                  summary: Default DescribeOrganizationConfigRules 200
                  x-microcks-default: true
                  value:
                    OrganizationConfigRules: example
                    NextToken: example
        '480':
          description: NoSuchOrganizationConfigRuleException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoSuchOrganizationConfigRuleException'
              examples:
                DescribeOrganizationConfigRules480Example:
                  summary: Default DescribeOrganizationConfigRules 480
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidNextTokenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidNextTokenException'
              examples:
                DescribeOrganizationConfigRules481Example:
                  summary: Default DescribeOrganizationConfigRules 481
                  x-microcks-default: true
                  value: example
        '482':
          description: InvalidLimitException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidLimitException'
              examples:
                DescribeOrganizationConfigRules482Example:
                  summary: Default DescribeOrganizationConfigRules 482
                  x-microcks-default: true
                  value: example
        '483':
          description: OrganizationAccessDeniedException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationAccessDeniedException'
              examples:
                DescribeOrganizationConfigRules483Example:
                  summary: Default DescribeOrganizationConfigRules 483
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeOrganizationConfigRulesRequest'
