name: Amazon Config
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
specificationVersion: '0.19'
description: >-
  AWS Config provides a detailed view of the configuration of AWS resources in
  your AWS account. This includes how the resources are related to one another
  and how they were configured in the past, enabling assessment, auditing, and
  evaluation of configurations for compliance and security governance. It
  records configuration changes continuously, evaluates compliance against
  rules, and supports automated remediation of noncompliant resources.
created: '2024-01-15'
modified: '2026-04-19'
