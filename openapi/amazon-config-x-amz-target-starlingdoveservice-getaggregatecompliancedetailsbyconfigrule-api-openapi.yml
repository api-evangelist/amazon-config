    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetAggregateComplianceDetailsByConfigRule
      description: <p>Returns the evaluation results for the specified Config rule for a specific resource in a rule. The results indicate which Amazon Web Services resources were evaluated by the rule, when each resource was last evaluated, and whether each resource complies with the rule. </p> <note> <p>The results can return an empty result page. But if you have a <code>nextToken</code>, the results are displayed on the next page.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAggregateComplianceDetailsByConfigRuleResponse'
              examples:
                GetAggregateComplianceDetailsByConfigRule200Example:
                  summary: Default GetAggregateComplianceDetailsByConfigRule 200
                  x-microcks-default: true
                  value:
                    AggregateEvaluationResults: example
                    NextToken: example
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                GetAggregateComplianceDetailsByConfigRule480Example:
                  summary: Default GetAggregateComplianceDetailsByConfigRule 480
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidLimitException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidLimitException'
              examples:
                GetAggregateComplianceDetailsByConfigRule481Example:
                  summary: Default GetAggregateComplianceDetailsByConfigRule 481
                  x-microcks-default: true
                  value: example
        '482':
          description: InvalidNextTokenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidNextTokenException'
              examples:
                GetAggregateComplianceDetailsByConfigRule482Example:
                  summary: Default GetAggregateComplianceDetailsByConfigRule 482
                  x-microcks-default: true
                  value: example
        '483':
          description: NoSuchConfigurationAggregatorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoSuchConfigurationAggregatorException'
              examples:
                GetAggregateComplianceDetailsByConfigRule483Example:
                  summary: Default GetAggregateComplianceDetailsByConfigRule 483
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAggregateComplianceDetailsByConfigRuleRequest'
      parameters:
      - name: Limit
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
