tags:
- name: '#X Amz Target=StarlingDoveService.DescribeConfigurationRecorderStatus'
paths:
  /#X-Amz-Target=StarlingDoveService.DescribeConfigurationRecorderStatus:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: DescribeConfigurationRecorderStatus
      description: <p>Returns the current status of the specified configuration recorder as well as the status of the last recording event for the recorder. If a configuration recorder is not specified, this action returns the status of all configuration recorders associated with the account.</p> <note> <p>&gt;You can specify only one configuration recorder for each Amazon Web Services Region for each account. For a detailed status of recording events over time, add your Config events to Amazon CloudWatch metrics and use CloudWatch metrics.</p> </note>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeConfigurationRecorderStatusResponse'
              examples:
                DescribeConfigurationRecorderStatus200Example:
                  summary: Default DescribeConfigurationRecorderStatus 200
                  x-microcks-default: true
                  value:
                    ConfigurationRecordersStatus: example
        '480':
          description: NoSuchConfigurationRecorderException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoSuchConfigurationRecorderException'
              examples:
                DescribeConfigurationRecorderStatus480Example:
                  summary: Default DescribeConfigurationRecorderStatus 480
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DescribeConfigurationRecorderStatusRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.DescribeConfigurationRecorderStatus
      summary: Amazon Config Describe Configuration Recorder Status
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=StarlingDoveService.DescribeConfigurationRecorderStatus'
components:
  schemas:
    RecorderStatus:
      type: string
      enum:
      - Pending
      - Success
      - Failure
    ConfigurationRecorderNameList:
      type: array
      items:
        $ref: '#/components/schemas/RecorderName'
    String:
      type: string
    NoSuchConfigurationRecorderException: {}
    Boolean:
      type: boolean
    Date:
      type: string
      format: date-time
    ConfigurationRecorderStatusList:
      type: array
      items:
        $ref: '#/components/schemas/ConfigurationRecorderStatus'
    DescribeConfigurationRecorderStatusRequest:
      type: object
      title: DescribeConfigurationRecorderStatusRequest
      properties:
        ConfigurationRecorderNames:
          allOf:
          - $ref: '#/components/schemas/ConfigurationRecorderNameList'
          - description: The name(s) of the configuration recorder. If the name is not specified, the action returns the current status of all the configuration recorders associated with the account.
      description: The input for the <a>DescribeConfigurationRecorderStatus</a> action.
    DescribeConfigurationRecorderStatusResponse:
      type: object
      properties:
        ConfigurationRecordersStatus:
          allOf:
          - $ref: '#/components/schemas/ConfigurationRecorderStatusList'
          - description: A list that contains status of the specified recorders.
      description: The output for the <a>DescribeConfigurationRecorderStatus</a> action, in JSON format.
    RecorderName:
      type: string
      minLength: 1
      maxLength: 256
    ConfigurationRecorderStatus:
      type: object
      properties:
        name:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The name of the configuration recorder.
        lastStartTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The time the recorder was last started.
        lastStopTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The time the recorder was last stopped.
        recording:
          allOf:
          - $ref: '#/components/schemas/Boolean'
          - description: Specifies whether or not the recorder is currently recording.
        lastStatus:
          allOf:
          - $ref: '#/components/schemas/RecorderStatus'
          - description: The status of the latest recording event processed by the recorder.
        lastErrorCode:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The latest error code from when the recorder last failed.
        lastErrorMessage:
          allOf:
          - $ref: '#/components/schemas/String'
          - description: The latest error message from when the recorder last failed.
        lastStatusChangeTime:
          allOf:
          - $ref: '#/components/schemas/Date'
          - description: The time of the latest change in status of an recording event processed by the recorder.
      description: <p>The current status of the configuration recorder.</p> <note> <p>For a detailed status of recording events over time, add your Config events to CloudWatch metrics and use CloudWatch metrics.</p> </note>
