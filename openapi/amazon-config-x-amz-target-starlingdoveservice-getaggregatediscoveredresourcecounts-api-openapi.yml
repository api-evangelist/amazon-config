    post:
      operationId: GetAggregateDiscoveredResourceCounts
      description: <p>Returns the resource counts across accounts and regions that are present in your Config aggregator. You can request the resource counts by providing filters and GroupByKey.</p> <p>For example, if the input contains accountID 12345678910 and region us-east-1 in filters, the API returns the count of resources in account ID 12345678910 and region us-east-1. If the input contains ACCOUNT_ID as a GroupByKey, the API returns resource counts for all source accounts that are present in your aggregator.</p>
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAggregateDiscoveredResourceCountsResponse'
              examples:
                GetAggregateDiscoveredResourceCounts200Example:
                  summary: Default GetAggregateDiscoveredResourceCounts 200
                  x-microcks-default: true
                  value:
                    TotalDiscoveredResources: example
                    GroupByKey: example
                    GroupedResourceCounts: example
                    NextToken: example
        '480':
          description: ValidationException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationException'
              examples:
                GetAggregateDiscoveredResourceCounts480Example:
                  summary: Default GetAggregateDiscoveredResourceCounts 480
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidLimitException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidLimitException'
              examples:
                GetAggregateDiscoveredResourceCounts481Example:
                  summary: Default GetAggregateDiscoveredResourceCounts 481
                  x-microcks-default: true
                  value: example
        '482':
          description: InvalidNextTokenException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidNextTokenException'
              examples:
                GetAggregateDiscoveredResourceCounts482Example:
                  summary: Default GetAggregateDiscoveredResourceCounts 482
                  x-microcks-default: true
                  value: example
        '483':
          description: NoSuchConfigurationAggregatorException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoSuchConfigurationAggregatorException'
              examples:
                GetAggregateDiscoveredResourceCounts483Example:
                  summary: Default GetAggregateDiscoveredResourceCounts 483
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetAggregateDiscoveredResourceCountsRequest'
      parameters:
      - name: Limit
        in: query
        schema:
          type: string
        description: Pagination limit
        required: false
      - name: NextToken
        in: query
        schema:
          type: string
        description: Pagination token
        required: false
      - name: X-Amz-Target
        in: header
