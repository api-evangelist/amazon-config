paths:
  /#X-Amz-Target=StarlingDoveService.GetComplianceSummaryByConfigRule:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: GetComplianceSummaryByConfigRule
      description: Returns the number of Config rules that are compliant and noncompliant, up to a maximum of 25 for each.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetComplianceSummaryByConfigRuleResponse'
              examples:
                GetComplianceSummaryByConfigRule200Example:
                  summary: Default GetComplianceSummaryByConfigRule 200
                  x-microcks-default: true
                  value:
                    ComplianceSummary: example
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.GetComplianceSummaryByConfigRule
      summary: Amazon Config Get Compliance Summary by Config Rule
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=StarlingDoveService.GetComplianceSummaryByConfigRule'
