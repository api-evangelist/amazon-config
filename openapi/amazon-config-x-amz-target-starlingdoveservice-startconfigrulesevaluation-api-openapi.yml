      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartConfigRulesEvaluationRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.StartConfigRulesEvaluation
      summary: Amazon Config Start Config Rules Evaluation
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
