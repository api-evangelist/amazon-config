security:
- hmac: []
tags:
- name: '#X Amz Target=StarlingDoveService.PutExternalEvaluation'
paths:
  /#X-Amz-Target=StarlingDoveService.PutExternalEvaluation:
    parameters:
    - $ref: '#/components/parameters/X-Amz-Content-Sha256'
    - $ref: '#/components/parameters/X-Amz-Date'
    - $ref: '#/components/parameters/X-Amz-Algorithm'
    - $ref: '#/components/parameters/X-Amz-Credential'
    - $ref: '#/components/parameters/X-Amz-Security-Token'
    - $ref: '#/components/parameters/X-Amz-Signature'
    - $ref: '#/components/parameters/X-Amz-SignedHeaders'
    post:
      operationId: PutExternalEvaluation
      description: Add or updates the evaluations for process checks. This API checks if the rule is a process check when the name of the Config rule is provided.
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PutExternalEvaluationResponse'
              examples:
                PutExternalEvaluation200Example:
                  summary: Default PutExternalEvaluation 200
                  x-microcks-default: true
                  value: {}
        '480':
          description: NoSuchConfigRuleException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoSuchConfigRuleException'
              examples:
                PutExternalEvaluation480Example:
                  summary: Default PutExternalEvaluation 480
                  x-microcks-default: true
                  value: example
        '481':
          description: InvalidParameterValueException
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidParameterValueException'
              examples:
                PutExternalEvaluation481Example:
                  summary: Default PutExternalEvaluation 481
                  x-microcks-default: true
                  value: example
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutExternalEvaluationRequest'
      parameters:
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.PutExternalEvaluation
      summary: Amazon Config Put External Evaluation
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
      tags:
      - '#X Amz Target=StarlingDoveService.PutExternalEvaluation'
components:
  schemas:
    BaseResourceId:
      type: string
      minLength: 1
      maxLength: 768
    NoSuchConfigRuleException: {}
    InvalidParameterValueException: {}
    PutExternalEvaluationRequest:
      type: object
      required:
      - ConfigRuleName
      - ExternalEvaluation
      title: PutExternalEvaluationRequest
      properties:
        ConfigRuleName:
          allOf:
          - $ref: '#/components/schemas/ConfigRuleName'
          - description: The name of the Config rule.
        ExternalEvaluation:
          allOf:
          - $ref: '#/components/schemas/ExternalEvaluation'
          - description: An <code>ExternalEvaluation</code> object that provides details about compliance.
    PutExternalEvaluationResponse:
      type: object
      properties: {}
    ExternalEvaluation:
      type: object
      required:
      - ComplianceResourceType
      - ComplianceResourceId
      - ComplianceType
      - OrderingTimestamp
      properties:
        ComplianceResourceType:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit256'
          - description: The evaluated compliance resource type. Config accepts <code>AWS::::Account</code> resource type.
        ComplianceResourceId:
          allOf:
          - $ref: '#/components/schemas/BaseResourceId'
          - description: The evaluated compliance resource ID. Config accepts only Amazon Web Services account ID.
        ComplianceType:
          allOf:
          - $ref: '#/components/schemas/ComplianceType'
          - description: The compliance of the Amazon Web Services resource. The valid values are <code>COMPLIANT, NON_COMPLIANT, </code> and <code>NOT_APPLICABLE</code>.
        Annotation:
          allOf:
          - $ref: '#/components/schemas/StringWithCharLimit256'
          - description: Supplementary information about the reason of compliance. For example, this task was completed on a specific date.
        OrderingTimestamp:
          allOf:
          - $ref: '#/components/schemas/OrderingTimestamp'
          - description: 'The time when the compliance was recorded. '
      description: Identifies an Amazon Web Services resource and indicates whether it complies with the Config rule that it was evaluated against.
    StringWithCharLimit256:
      type: string
      minLength: 1
      maxLength: 256
    ComplianceType:
      type: string
      enum:
      - COMPLIANT
      - NON_COMPLIANT
      - NOT_APPLICABLE
      - INSUFFICIENT_DATA
    OrderingTimestamp:
      type: string
      format: date-time
    ConfigRuleName:
      type: string
      pattern: .*\S.*
      minLength: 1
      maxLength: 128
  parameters:
    X-Amz-Date:
      name: X-Amz-Date
      in: header
      schema:
        type: string
      required: false
    X-Amz-SignedHeaders:
      name: X-Amz-SignedHeaders
      in: header
      schema:
        type: string
      required: false
    X-Amz-Content-Sha256:
      name: X-Amz-Content-Sha256
      in: header
      schema:
        type: string
      required: false
    X-Amz-Credential:
      name: X-Amz-Credential
      in: header
      schema:
        type: string
      required: false
    X-Amz-Algorithm:
      name: X-Amz-Algorithm
      in: header
      schema:
        type: string
      required: false
    X-Amz-Security-Token:
      name: X-Amz-Security-Token
      in: header
      schema:
        type: string
      required: false
    X-Amz-Signature:
      name: X-Amz-Signature
      in: header
      schema:
        type: string
      required: false
  securitySchemes:
    hmac:
      type: apiKey
      name: Authorization
      in: header
      description: Amazon Signature authorization v4
      x-amazon-apigateway-authtype: awsSigv4
