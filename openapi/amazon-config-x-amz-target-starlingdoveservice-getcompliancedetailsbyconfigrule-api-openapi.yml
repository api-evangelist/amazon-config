        required: false
      - name: X-Amz-Target
        in: header
        required: true
        schema:
          type: string
          enum:
          - StarlingDoveService.GetComplianceDetailsByConfigRule
      summary: Amazon Config Get Compliance Details by Config Rule
      x-microcks-operation:
