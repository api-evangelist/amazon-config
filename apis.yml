apis:
  - name: Amazon Config API
    description: >-
      The AWS Config API provides 92 operations for managing configuration
      recording, evaluating resource compliance against rules, querying resource
      configurations, tracking configuration history, managing conformance packs,
      configuring remediation, and aggregating configuration data across accounts
      and regions for comprehensive governance.
